<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Bolly Shampoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape"></div>
    <header class="header">
      <div class="logo">bolly</div>
      <nav class="pill-nav">
        <a href="#" class="active">Shop +</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>
      <div class="cart">
        <span>Cart</span>
        <div class="cart-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <path d="M16 10a4 4 0 0 1-8 0"></path>
          </svg>
        </div>
      </div>
    </header>

    <main class="hero">
      <div class="hero-center">
        <div class="bottle-glow"></div>
        <div id="app"></div>
      </div>

      <div class="hero-left">
        <div class="subtitle-wrapper">
          <span class="subtitle-text">FROM ROOT</span>
          <span class="pill-badge">TO SHINE</span>
        </div>
        <h1 class="headline">
          <span>KNOCK</span>
          <span>OUT</span>
          <span>FLAKES</span>
        </h1>
      </div>

      <div class="hero-right">
        <p class="journey-text">
          Journey in to the<br/>
          wonderful world of<br/>
          shampoo
        </p>
        <div class="explore-wrapper">
          <button class="explore-btn">EXPLORE MORE</button>
          <button class="arrow-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M7 17L17 7M7 7h10v10"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
